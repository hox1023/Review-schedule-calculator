<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에빙하우스 복습 플래너</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { 
      font-family: Pretendard, sans-serif; 
      background-color: #f3f4f6;
    }
  </style>
</head>

<body class="text-black min-h-screen flex items-center justify-center p-5">

  <div class="max-w-2xl w-full bg-white rounded-[2.5rem] border border-gray-200 shadow-2xl p-8 md:p-12">
    
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black text-blue-600 mb-3 tracking-tight">
        복습 계산기
      </h1>
      <p class="text-gray-500 font-medium">
        망각곡선을 이기는 가장 과학적인 복습 주기
      </p>
    </div>

    <div class="bg-blue-50 border border-blue-100 rounded-3xl p-6 mb-10 shadow-sm">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
          <div class="text-sm text-blue-600 font-bold mb-1">복습 기준일 설정</div>
          <div id="todayDate" class="text-2xl font-black text-gray-800"></div>
        </div>
        <div class="relative w-full md:w-auto">
          <input 
            type="date" 
            id="datePicker" 
            class="w-full md:w-auto px-4 py-3 bg-white border-2 border-blue-200 rounded-2xl font-bold text-gray-700 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all cursor-pointer"
          >
        </div>
      </div>
    </div>

    <div class="space-y-4">
      <h2 class="text-lg font-bold text-gray-700 ml-1 mb-2">📅 오늘 복습해야 할 학습일</h2>
      <div id="reviewList" class="space-y-3">
        </div>
    </div>

    <div class="mt-10 pt-6 border-t border-gray-100 text-center">
      <p class="text-sm text-gray-400">
        위 날짜에 학습했던 내용을 오늘 복습하면 기억 효율이 극대화됩니다.
      </p>
    </div>

  </div>

  <script>
    // 복습 주기 설정 (1일, 2일, 3일, 7일, 14일, 30일)
    const intervals = [
      { step: 1, days: 1, color: 'text-blue-600' },
      { step: 2, days: 2, color: 'text-indigo-600' },
      { step: 3, days: 3, color: 'text-violet-600' },
      { step: 4, days: 7, color: 'text-purple-600' },
      { step: 5, days: 14, color: 'text-fuchsia-600' },
      { step: 6, days: 30, color: 'text-pink-600' }
    ];

    const datePicker = document.getElementById('datePicker');
    const todayDisplay = document.getElementById('todayDate');
    const reviewList = document.getElementById('reviewList');

    // 초기 날짜 설정 (사용자 로컬 시간 기준)
    const now = new Date();
    const offset = now.getTimezoneOffset() * 60000;
    const localDate = new Date(now - offset).toISOString().split('T')[0];
    datePicker.value = localDate;

    function formatDate(date) {
      return date.toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'short'
      });
    }

    function updateReviewDates() {
      const baseDate = new Date(datePicker.value);
      todayDisplay.innerText = formatDate(baseDate);
      reviewList.innerHTML = '';

      intervals.forEach(item => {
        const target = new Date(baseDate);
        target.setDate(baseDate.getDate() - item.days);

        reviewList.innerHTML += `
          <div class="flex items-center justify-between bg-white border border-gray-100 rounded-2xl p-5 hover:border-blue-300 hover:shadow-md transition-all group">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-gray-50 flex items-center justify-center font-black ${item.color} border border-gray-100">
                ${item.step}
              </div>
              <div>
                <div class="${item.color} font-black text-xs uppercase tracking-wider">${item.step}차 복습 주기</div>
                <div class="font-bold text-lg text-gray-500 group-hover:text-gray-800 transition-colors">${item.days}일 전 학습분</div>
              </div>
            </div>
            <div class="text-right">
              <div class="font-black text-xl text-gray-800 tracking-tight">${formatDate(target)}</div>
              <div class="text-[10px] text-gray-300 font-bold mt-0.5">REVIEW TARGET</div>
            </div>
          </div>
        `;
      });
    }

    // 날짜 변경 이벤트 리스너
    datePicker.addEventListener('change', updateReviewDates);
    
    // 초기 로드 시 실행
    updateReviewDates();
  </script>

</body>
</html>
